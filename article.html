<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Article</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <section class="active">

    <div id="articleBox"></div>

  </section>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>

    const supabaseUrl =
    "https://qldtsrlcjarlgowshere.supabase.co";

    const supabaseKey =
    "sb_publishable_VHJ2xACTYwziLbfQQoaDhg_xehncUdX";


    const db =
    window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );


    async function loadArticle(){

      const params =
        new URLSearchParams(
          window.location.search
        );


      const id =
        params.get("id");


      const {
        data,
        error
      } = await db
          .from("news")
          .select("*")
          .eq("id", id)
          .single();


      if(error){

        console.log(error);

        return;
      }


      document
        .getElementById("articleBox")
        .innerHTML = `

        <div class="card">

          <span class="category">
            ${data.category}
          </span>

          <h1>
            ${data.title}
          </h1>

          <p>
            ${data.content}
          </p>

        </div>

      `;
    }


    loadArticle();

  </script>

</body>
</html>
